<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>نظام جدولة الخدمات</title>

<style>
body {
    font-family: Arial;
    background: #0e1117;
    color: white;
    direction: rtl;
    text-align: right;
    margin: 0;
}

.container {
    max-width: 900px;
    margin: auto;
    padding: 20px;
}

h1 {
    text-align: center;
    margin-bottom: 20px;
}

.controls {
    background: #1c1f26;
    padding: 15px;
    border-radius: 10px;
    margin-bottom: 20px;
}

input, button {
    padding: 10px;
    margin: 5px 0;
    width: 100%;
    border-radius: 6px;
    border: none;
}

button {
    background: #2d8cff;
    color: white;
    font-weight: bold;
    cursor: pointer;
}

button:hover {
    background: #1a6fe0;
}

.card {
    background: #1c1f26;
    padding: 15px;
    margin-bottom: 15px;
    border-radius: 10px;
}

.service {
    margin-bottom: 10px;
    padding: 8px;
    background: #2a2e38;
    border-radius: 6px;
}

.service b {
    display: block;
    margin-bottom: 5px;
    color: #4fc3f7;
}

.people {
    font-size: 14px;
    line-height: 1.6;
}

.name-tag {
    display: inline-block;
    cursor: pointer;
    color: #4fc3f7;
    margin: 2px 4px;
    padding: 2px 6px;
    border-radius: 4px;
    background: #1c2a38;
}

.name-tag:hover {
    background: #2d8cff;
    color: white;
}

</style>
</head>

<body>

<div class="container">

<h1>نظام جدولة الخدمات</h1>

<div class="controls">
    <input type="file" id="file">
    <button onclick="upload()">تحميل الأسماء</button>

    <input type="number" id="days" value="7">
    <button onclick="generate()">توليد الجدول</button>
</div>

<div id="result"></div>

</div>

<script src="/static/app.js"></script>

</body>
</html>
